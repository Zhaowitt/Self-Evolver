# Example EasyR1 GRPO overrides for online Controller training.
# Paths are relative to the Self-Evolver repo root; run EasyR1 from there
# (see scripts/run_rl_controller.sh).
experiment_name: self_evolver_controller_online_grpo
controller_model: Qwen/Qwen2.5-1.5B-Instruct

data:
  # Generate with:
  #   python -m src.rl.easyr1_dataset --output data/controller_train.jsonl \
  #     --dataset full --split train --exclude-ids data/eval_ids.txt
  #   python -m src.rl.easyr1_dataset --output data/controller_val.jsonl \
  #     --dataset lite --split dev --stage eval
  train_files: data/controller_train.jsonl
  val_files: data/controller_val.jsonl
  prompt_key: prompt
  answer_key: ground_truth
  max_prompt_length: 8192
  max_response_length: 1536
  rollout_batch_size: 8

worker:
  reward:
    reward_function: src/reward/online_reward.py:compute_score

# Environment variables read by compute_score (set before launching EasyR1):
#   SELF_EVOLVER_TEST_BACKEND     apptainer (default) | docker — container
#                                 engine for official-semantics patch grading
#   SELF_EVOLVER_REWARD_CONFIG    reward config path (default configs/reward_config.yaml)
#   SELF_EVOLVER_ROLLOUT_JSONL    rollout log path (default benchmark_results/online_rollouts.jsonl)
#   SELF_EVOLVER_REWARD_WORKSPACE workspace for cached repo checkouts
#   SELF_EVOLVER_ENABLE_SKILL_EVOLUTION  1 to evolve skills during training (default 0)
#   SELF_EVOLVER_MAX_ITERATIONS   repair-loop budget per episode
self_evolver:
  rollout_jsonl: benchmark_results/online_rollouts.jsonl
  reward_config: configs/reward_config.yaml
  enable_skill_evolution: false

serving:
  engine: vllm
  base_url: http://127.0.0.1:8000/v1
  model_env: CONTROLLER_MODEL

notes:
  - rollout_jsonl is execution logging only, not the reward source.
  - EasyR1 calls src/reward/online_reward.py:compute_score per rollout batch;
    each sample runs a full repair episode plus one container eval, so keep
    rollout_batch_size small.
  - Evaluation mode must keep task_wrapper disabled (stage=eval enforces it).
