experiment_name: self_evolver_controller_mock_grpo
controller_model: Qwen/Qwen2.5-1.5B
rollout_jsonl: benchmark_results/rollouts.jsonl
dataset_jsonl: benchmark_results/easyr1_dataset.jsonl
reward_script: python -m src.reward.easyr1_adapter
serving:
  engine: vllm
  base_url: http://<gpu-host>:8000/v1
  model_env: CONTROLLER_MODEL
notes:
  - This repo provides rollout, dataset, and reward adapters.
  - EasyR1 owns GRPO training, checkpointing, and distributed rollout orchestration.
  - Evaluation mode must keep task_wrapper disabled.
